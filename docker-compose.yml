services:
  api:
    init: true
    ipc: host
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PYTHONUNBUFFERED: "1"
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    env_file:
      - ./deploy/docker/compose.env
    volumes:
      - zwmp-data:/app/data
      - ./config/zwmp.config.json:/app/config/zwmp.config.json:ro
    restart: unless-stopped
    shm_size: "1gb"
    # privileged: true
    security_opt:
      - seccomp=unconfined
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    ports:
      - "8181:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zwmp-data:
